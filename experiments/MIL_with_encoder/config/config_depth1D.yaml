hydra:
  run:
    dir: results/${experiment}/${hydra.job.name}/${model.name}/${data.dataloader}/${now:%Y-%m-%d}/${now:%H-%M-%S}

experiment: depth

training:
  epochs: 90
  learning_rate: 1e-4
  weight_decay: 5e-4
  weight_update_freq: 1
  seed: 2
  multi_gpu: False

model:
  classes: 1
  name: 'resnetdepth'
  model_type: '2D'
  pretrained_imagenet: True
  neighbour_range: 0
  num_heads: 1
  inst_norm: True
  ghostnorm: False
  pretrained: False
  depth: True
  classification: False
  frozen_backbone: False
  dann: False
  cysts: False

data:
  batch_size: 1
  take_every_nth_slice: 3
  data_augmentations: True
  plane: axial
  dataloader: kidney_real
  crop_size: 200
  as_rgb: True
  roll_slices: True
  TUH_only: False
  TUH_extra_data: False
  compass_filter: False
  important_slices_only: False
  no_lungs: False
  patchify: False
  nr_of_patches: 96
  slice_level_supervision: 0
  random_experiment: False
  spheres: False
  sample: uniform

